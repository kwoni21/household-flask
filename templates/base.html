<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}원♡순 가계부{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      💰 <span>원♡순 가계부</span>
      <span>👤 {{ userid }}</span>
    </div>
    <nav>
      <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">
        📊 <span>대시보드</span>
      </a>
      <a href="{{ url_for('transactions') }}" class="{% if request.endpoint == 'transactions' %}active{% endif %}">
        📋 <span>거래 내역</span>
      </a>
      <a href="{{ url_for('add_transaction') }}" class="{% if request.endpoint == 'add_transaction' %}active{% endif %}">
        ➕ <span>거래 입력</span>
      </a>
      <a href="{{ url_for('categories') }}" class="{% if request.endpoint == 'categories' %}active{% endif %}">
        ⚙️ <span>카테고리</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="{{ url_for('logout') }}">🚪 <span>로그아웃</span></a>
    </div>
  </aside>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
