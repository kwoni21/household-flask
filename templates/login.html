<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>원♡순 가계부 - 로그인</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-title">💰 원♡순 가계부</div>
    <div class="login-sub">로그인하여 가계부를 관리하세요</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" id="login-form">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" name="userid" id="userid" placeholder="아이디 입력" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="비밀번호 입력" required autocomplete="current-password">
      </div>
      <div class="remember-row">
        <input type="checkbox" id="remember">
        <label for="remember">아이디 저장</label>
      </div>
      <button type="submit" class="btn-login">로그인</button>
    </form>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
