{% extends 'base.html' %}
{% block title %}거래 입력 - 원♡순 가계부{% endblock %}
{% block content %}
<div class="page-title">➕ 거래 입력</div>

<div class="form-card">
  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-grid">
      <!-- 왼쪽 -->
      <div class="form-group">
        <label>날짜</label>
        <input type="date" name="date" value="{{ today }}" required>
      </div>
      <div class="form-group">
        <label>카테고리</label>
        <select name="cat_code" required>
          {% for cat in cats %}
          <option value="{{ cat.code }}">{{ cat.code }} | {{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- 수입 -->
      <div class="form-group">
        <label>수입 (원)</label>
        <input class="amount-input" type="text" inputmode="numeric"
               placeholder="0" data-target="income_raw" autocomplete="off">
        <input type="hidden" name="income" id="income_raw" value="0">
      </div>

      <!-- 지출 -->
      <div class="form-group">
        <label>지출 (원)</label>
        <input class="amount-input" type="text" inputmode="numeric"
               placeholder="0" data-target="expense_raw" autocomplete="off">
        <input type="hidden" name="expense" id="expense_raw" value="0">
      </div>

      <!-- 내용 -->
      <div class="form-group full">
        <label>내용</label>
        <input type="text" name="description" placeholder="내용을 입력하세요" required>
      </div>

      <!-- 신용카드 -->
      <div class="form-group full">
        <div class="checkbox-group">
          <input type="checkbox" name="credit" id="credit" value="1">
          <label for="credit">💳 신용카드 결제</label>
        </div>
      </div>

      <!-- 저장 버튼 -->
      <div class="form-group full">
        <button type="submit" class="btn btn-primary btn-submit">저장</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  // 날짜 기본값 오늘
  document.querySelector('input[name=date]').value = new Date().toISOString().slice(0,10);
</script>
{% endblock %}
